<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản E-Commerce</title>
</head>
<body>
    
    <h1>Đăng ký tài khoản E-Commerce</h1>
    <form action="#" method="post">

        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="name">Họ và tên:</label>
            <input type="text" id="name" required minlength="2" maxlength="50" placeholder="Nhập họ và tên"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" required placeholder="Nhập email"><br><br>
            <label for="tel">Số điện thoại:</label>
            <input type="tel" id="tel" required placeholder="Nhập số điện thoại" pattern="[0-9]{10}"><br><br>
            <label for="date">Ngày sinh:</label>
            <input type="date" id="date" required max="2026-12-31"><br><br>
        </fieldset>
        <fieldset>
            <legend>Tài khoản</legend>
            <label for="username">Username:</label>
            <input type="text" id="username" pattern="[A-Za-z0-9_]{3,20}" placeholder="Nhập tên đăng nhập"><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" required minlength="8" placeholder="Nhập mật khẩu"><br><br>
            <label for="confirm_password">Xác nhận mật khẩu:</label>
            <input type="password" id="confirm_password" required minlength="8" placeholder="Xác nhận mật khẩu"><br><br>
        </fieldset>
        <fieldset>
            <legend>Thông tin giao hàng</legend>
            <label for="city">Thành phố:</label>
            <input type="text" id="city" placeholder="Nhập thành phố"><br><br>
            <select name="city" id="city">
                <option value="">Chọn thành phố</option>
                <option value="Hà Nội">Hà Nội</option>
                <option value="TP. Hồ Chí Minh">TP. Hồ Chí Minh</option>
                <option value="Đà Nẵng">Đà Nẵng</option>
                <option value="Hải Phòng">Hải Phòng</option>
            </select>
            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district">
                <option value="">Chọn quận/huyện</option>
                <option value="Quận 1">Quận 1</option>
                <option value="Quận 2">Quận 2</option>
                <option value="Quận 3">Quận 3</option>
            </select>
            <br><br>
            <label for="address">Địa chỉ chi tiết:</label>
            <textarea id="address" name="address"
                  rows="3"
                  placeholder="Số nhà, đường..."></textarea>
            <br><br>
            <label for="gender">Giới tính:</label>
            <input type="radio" id="gender-male" name="gender">
            <label for="gender-male">Nam</label>
            <input type="radio" id="gender-female" name="gender">
            <label for="gender-female">Nữ</label>
            <input type="radio" id="gender-other" name="gender">
            <label for="gender-other">Khác</label>
        </fieldset>
        <button type="submit">Xác nhận</button>
        <button type="reset">Nhập lại</button>
    </form>

</body>
</html>
