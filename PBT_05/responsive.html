<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Responsive Product Page</title>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <header class="site-header">
    <div class="logo">MyShop</div>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="hamburger">☰</label>
    <nav class="main-nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h3>Filters</h3>
      <div class="filters">
        <select>
          <option>Category</option>
          <option>Clothes</option>
          <option>Electronics</option>
        </select>
        <select>
          <option>Price</option>
          <option>Under $50</option>
        </select>
      </div>
    </aside>

    <main class="product-area">
      <div class="product-grid">
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 1">
          <h4>Product 1</h4>
          <p class="price">$19.99</p>
          <button class="buy">Mua ngay</button>
        </article>
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 2">
          <h4>Product 2</h4>
          <p class="price">$29.99</p>
          <button class="buy">Mua ngay</button>
        </article>
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 3">
          <h4>Product 3</h4>
          <p class="price">$9.99</p>
          <button class="buy">Mua ngay</button>
        </article>
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 4">
          <h4>Product 4</h4>
          <p class="price">$39.99</p>
          <button class="buy">Mua ngay</button>
        </article>
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 5">
          <h4>Product 5</h4>
          <p class="price">$24.99</p>
          <button class="buy">Mua ngay</button>
        </article>
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 6">
          <h4>Product 6</h4>
          <p class="price">$14.99</p>
          <button class="buy">Mua ngay</button>
        </article>
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 7">
          <h4>Product 7</h4>
          <p class="price">$49.99</p>
          <button class="buy">Mua ngay</button>
        </article>
        <article class="card">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQODf9dzCvlCAyDwoTgEndKmC9vECmZtMKWwGpKoV8Gfg&s=10" alt="Product 8">
          <h4>Product 8</h4>
          <p class="price">$59.99</p>
          <button class="buy">Mua ngay</button>
        </article>
      </div>
    </main>

    <aside class="ads">
      <div class="ad-box">Ad Space</div>
    </aside>
  </div>

  <footer class="site-footer">
    <p>&copy; MyShop</p>
  </footer>
</body>
</html>
