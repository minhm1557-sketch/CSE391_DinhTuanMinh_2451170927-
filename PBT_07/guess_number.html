<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Đoán Số</title>
</head>
<body>
    <div class="container">
        <h1>Game Đoán Số</h1>
        
        <div class="info">
            <p>Hãy đoán một số từ <strong>1 đến 100</strong></p>
            <p>Bạn có <strong>7 lần</strong> để đoán đúng!</p>
        </div>

        <div class="button-group">
            <button id="startBtn">Bắt Đầu Game</button>
            <button id="resetBtn">Chơi Lại</button>
        </div>

        <div class="rules">
            <h3>Hướng Dẫn:</h3>
            <ul>
                <li>Máy sẽ hiển thị hộp nhập liệu</li>
                <li>Nhập số từ 1-100 và click OK</li>
                <li>Máy sẽ báo "Cao hơn" hoặc "Thấp hơn"</li>
                <li>Đoán đúng trước khi hết 7 lần = Thắng!</li>
                <li>Không được đoán cùng số 2 lần</li>
            </ul>
        </div>

        <footer>
            <p>Chúc bạn chơi vui vẻ!</p>
        </footer>
    </div>

    <script src="guess.js"></script>
</body>
</html>
