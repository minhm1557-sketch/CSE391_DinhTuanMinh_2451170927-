<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia</title>
</head>
<body>
    <h1>Iphone 17 Pro Max</h1>
    <section>
        <h2>Ảnh sản phẩm</h2>
        <figure>
            <img src="pic/iphone-17-pro_1.webp" alt="Mặt trước iphone 17 Pro Max" width="400">
            <figcaption>Mặt trước</figcaption>
        </figure>
        <figure>
            <img src="pic/iphone-17-pro-max-2_1_1.webp" alt="Mặt bên iphone 17 Pro Max" width="300">
            <figcaption>Mặt bên</figcaption>
        </figure>
        <figure>
            <img src="pic/iphone-17-pro-max_1_1.webp" alt="Mặt sau iphone 17 Pro Max" width="300">
            <figcaption>Mặt sau</figcaption>
        </figure>
    </section>
    <section>
        <h2>Video sản phẩm</h2>
        <figure>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/3s49ddWEluo?si=03dxCj-4eBhPdTyH" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <figcaption>Tổng quan sản phẩm</figcaption>
        </figure>
        <figure>
            <video controls width="560" height="315" poster="pic/hvl.jpg">    
                <source src="pic/HVL - 360 Album Trailer - YouTube.mp4" type="video/mp4">
                <source src="pic/HVL - 360 Album Trailer - YouTube.mp4" ype="video/ogg">
            </video>
            <figcaption>Hợp tác với nghệ sĩ MCK</figcaption>
        </figure>
    </section>
    <section>
        <h2>Âm thanh giới thiệu</h2>
        <figure>
            <audio controls>
                <source src="pic/Anh Tao Anh Mày - Thơ Ô Lô Đô - Điệu Tango Quyến Rũ Cùng Anh Độ Mixue Và Sena - Phổ Nhạc Vô Danh - YouTube.mp3" type="audio/mpeg">
            </audio>
            <figcaption>Âm thanh khởi động</figcaption>
        </figure>
    </section>
    <section>
        <h2>Logo SVG</h2>

        <svg width="120" height="120">
            <circle cx="60" cy="60" r="50" fill="blue" />
            <rect x="35" y="35" width="50" height="50" fill="white" />
        </svg>

    </section>
</body>
</html>
