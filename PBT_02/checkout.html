<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng</title>
</head>
<body>
    <h1> Đặt hàng</h1>
    <section>
        <h2>Giỏ hàng</h2>
        <table border="1" cellpadding="8" cellspacing="0">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>    

            <tbody>
                <tr>
                    <td>1</td>
                    <td>Điện thoại</td>
                    <td>10,000,000</td>
                    <td>1</td>
                    <td>10,000,000</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Tai nghe</td>
                    <td>1,000,000</td>
                    <td>2</td>
                    <td>2,000,000</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Sạc dự phòng</td>
                    <td>500,000</td>
                    <td>1</td>
                    <td>500,000</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <td colspan="4"><strong>Tổng cộng</strong></td>
                    <td><strong>12,500,000</strong></td>
                </tr>
            </tfoot>
        </table>
    </section>
    <section>
        <h2>Thanh toán và giao hàng</h2>
        <form action="">
            <h3>Thanh toán</h3>
            <label for="payment">Phương thức thanh toán:</label>
            <input type="radio" id="COD" name="payment" value="COD">
            <label for="COD">COD</label>
            <input type="radio" id="transfer" name="payment" value="transfer">
            <label for="transfer">Chuyển khoản</label>
            <input type="radio" id="e-wallet" name="payment" value="e-wallet">
            <label for="e-wallet">Ví điện tử</label><br><br>
            <label for="discount">Mã giảm giá:</label>
            <input type="text" id="discount" name="discount" placeholder="Nhập mã giảm giá" pattern="SALE[0-9]{4}"><br><br>
            <label for="note">Ghi chú:</label>
            <textarea id="note" name="note" placeholder="Nhập ghi chú"></textarea><br><br>

            <h3>Thông tin giao hàng</h3>
            <label for="time_date">Ngày giao hàng:</label>
            <input type="date" id="time_date" name="time_date" min="2026-3-5"><br><br>
            <label for="time_frame">Khung giờ giao hàng:</label>
            <select id="time_frame" name="time_frame">
                <option value="morning">Sáng (8h - 12h)</option>
                <option value="afternoon">Chiều (13h - 17h)</option>
                <option value="evening">Tối (18h - 22h)</option>
            </select><br><br>
            <label for="time_wait">Thời gian giao hàng</label>
            <input type="range" id="time_wait" name="time_wait" min="1" max="7" step="1"><br><br>
            <button type="submit" aria-label="Xác nhận đặt hàng">Xác nhận đặt hàng</button>
        </form>
        
    </section>
</body>
</html>
