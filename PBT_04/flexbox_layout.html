<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Layout Demo</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">LOGO</div>
        <div class="menu">
            <a href="#">Home</a>

        </div>

            <button class="btn">Login</button>
            <button class="btn">Register</button>
        </div>
    </nav>


    <main class="container">
        <h1>Product Grid</h1>
        <div class="product-grid">
            <div class="product-card">
                <img src="pic/A2_1.jpg" alt="Product 1">
                <h3>Product 1</h3>
                <p class="price">$29.99</p>
                <button class="buy-btn">Mua</button>
            </div>
            <div class="product-card">
                <img src="pic/A2_1.jpg" alt="Product 2">
                <h3>Product 2</h3>
                <p class="price">$39.99</p>
                <button class="buy-btn">Mua</button>
            </div>
            <div class="product-card">
                <img src="pic/A2_1.jpg" alt="Product 3">
                <h3>Product 3</h3>
                <p class="price">$19.99</p>
                <button class="buy-btn">Mua</button>
            </div>
            <div class="product-card">
                <img src="pic/A2_1.jpg" alt="Product 4">
                <h3>Product 4</h3>
                <p class="price">$49.99</p>

            <div class="product-card">
                <img src="pic/A2_1.jpg" alt="Product 5">

                <img src="pic/A2_1.jpg" alt="Product 6">

                <p class="price">$34.99</p>

            </div>
            <div class="product-card">
                <img src="pic/A2_1.jpg" alt="Product 7">

                <p class="price">$14.99</p>
                <button class="buy-btn">Mua</button>
            </div>
            <div class="product-card">
                <img src="pic/A2_1.jpg" alt="Product 8">
                <h3>Product 8</h3>
                <p class="price">$59.99</p>
                <button class="buy-btn">Mua</button>
            </div>
        </div>
    </main>
</body>
</html>
