<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout E-Commerce</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="page-grid">
        <header class="site-header">
            <div class="brand">E-Commerce</div>
            <nav class="main-nav">
                <a href="#">Home</a>
                <a href="#">Shop</a>
                <a href="#">Deals</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-content">
                <h1>Cửa hàng trực tuyến</h1>
                <p>Ưu đãi lễ hội, giao hàng nhanh chóng!</p>
                <button>Mua ngay</button>
            </div>
        </section>

        <aside class="sidebar">
            <h2>Filters</h2>
            <div class="filter-group">
                <label><input type="checkbox"> Mẫu mới</label>
                <label><input type="checkbox"> Bán chạy</label>
                <label><input type="checkbox"> Đang giảm giá</label>
            </div>
            <div class="filter-group">
                <h3>Category</h3>
                <label><input type="checkbox"> Giày</label>
                <label><input type="checkbox"> Quần áo</label>
                <label><input type="checkbox"> Phụ kiện</label>
            </div>
        </aside>

        <main class="main-content">
            <div class="product-grid">
                <article class="product-card">
                    <img src="pic/A2_1.jpg" alt="Giày Sneakers" class="product-image">
                    <div class="product-info">
                        <h3>Giày Sneakers</h3>
                        <p class="price">$79</p>
                    </div>
                    <button class="buy-btn">Buy</button>
                </article>
                <article class="product-card">
                    <img src="pic/A2_1.jpg" alt="Áo khoác hè" class="product-image">
                    <div class="product-info">
                        <h3>Áo khoác hè</h3>
                        <p class="price">$119</p>
                    </div>
                    <button class="buy-btn">Buy</button>
                </article>
                <article class="product-card">
                    <img src="pic/A2_1.jpg" alt="Túi da" class="product-image">
                    <div class="product-info">
                        <h3>Túi da</h3>
                        <p class="price">$89</p>
                    </div>
                    <button class="buy-btn">Buy</button>
                </article>
                <article class="product-card">
                    <img src="pic/A2_1.jpg" alt="Tai nghe không dây" class="product-image">
                    <div class="product-info">
                        <h3>Tai nghe không dây</h3>
                        <p class="price">$99</p>
                    </div>
                    <button class="buy-btn">Buy</button>
                </article>
                <article class="product-card">
                    <img src="pic/A2_1.jpg" alt="Đồng hồ thông minh" class="product-image">
                    <div class="product-info">
                        <h3>Đồng hồ thông minh</h3>
                        <p class="price">$129</p>
                    </div>
                    <button class="buy-btn">Buy</button>
                </article>
                <article class="product-card">
                    <img src="pic/A2_1.jpg" alt="Ba lô du lịch" class="product-image">
                    <div class="product-info">
                        <h3>Ba lô du lịch</h3>
                        <p class="price">$69</p>
                    </div>
                    <button class="buy-btn">Buy</button>
                </article>
            </div>
        </main>

        <aside class="ads">
            <div class="ad-banner">Advertisement</div>
        </aside>

        <footer class="site-footer">
            <p>© 2026 E-Commercee</p>
        </footer>
    </div>
</body>
</html>
